name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Formatting is platform-independent, so check it once rather than per-OS.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  # Build, test, lint, and format-check the example scripts across every
  # supported OS on stable Rust (edition 2024).
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Caches the cargo registry and build artifacts, keyed on the OS and
      # Cargo.lock, for fast incremental CI.
      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --workspace --all-targets --locked

      - name: cargo test
        run: cargo test --workspace --locked

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      # Dogfood the formatter: every committed `.ms` script must be in
      # canonical style (the editor/CLI equivalent of `cargo fmt --check`).
      - name: mainstage format --check
        run: >
          cargo run --quiet --bin mainstage --locked --
          format --check
          main.ms
          examples/hello/main.ms
          examples/static-site/main.ms
          examples/data-report/main.ms
          tests/stdlib.ms
          tests/validation_errors.ms
          tests/diagnostics.ms
          tests/plugin/main.ms
          tests/templates.ms

  # Compile the VS Code extension and run its tests, including the integration
  # suite that drives the real language server over stdio — the client/server
  # contract the editor depends on. Building the server first means the
  # integration tests actually run rather than skip.
  extension:
    name: vscode extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build language server
        run: cargo build -p mainstage_lsp --bin mainstage-lsp --locked

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: editors/vscode

      - name: Test extension
        run: npm test
        working-directory: editors/vscode
        env:
          MAINSTAGE_LSP_BIN: ${{ github.workspace }}/target/debug/mainstage-lsp
