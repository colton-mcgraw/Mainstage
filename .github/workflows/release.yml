name: Release

# Cut a release by pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build the `mainstage` and `mainstage-lsp` binaries for every supported
  # target and package them with a SHA-256 checksum.
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --locked --target ${{ matrix.target }} --bin mainstage --bin mainstage-lsp

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release"
          stage="mainstage-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "dist/$stage"
          cp "$bin/mainstage" "$bin/mainstage-lsp" "dist/$stage/"
          cp README.md LICENSE.md CHANGELOG.md "dist/$stage/"
          tar -czf "dist/$stage.tar.gz" -C dist "$stage"
          rm -rf "dist/$stage"
          ( cd dist && shasum -a 256 "$stage.tar.gz" > "$stage.tar.gz.sha256" )

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bin = "target/${{ matrix.target }}/release"
          $stage = "mainstage-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$stage" | Out-Null
          Copy-Item "$bin/mainstage.exe","$bin/mainstage-lsp.exe" "dist/$stage/"
          Copy-Item README.md,LICENSE.md,CHANGELOG.md "dist/$stage/"
          Compress-Archive -Path "dist/$stage" -DestinationPath "dist/$stage.zip"
          Remove-Item -Recurse -Force "dist/$stage"
          $hash = (Get-FileHash "dist/$stage.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $stage.zip" | Out-File -Encoding ascii -NoNewline "dist/$stage.zip.sha256"

      - name: Upload target artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  # Collect every target's archive and checksum into a single GitHub Release.
  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --repo "${{ github.repository }}" --title "${{ github.ref_name }}" --generate-notes --verify-tag
