name: Publish to crates.io

# Publishes the crates when a version tag is pushed. Requires a
# CARGO_REGISTRY_TOKEN repository secret and the crate names to be available
# (or already owned) on crates.io. Bump the crate versions before tagging.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # Dependency order: the CLI depends on both core and the LSP crate, so
      # those must be on the registry first. `cargo publish` waits for each
      # crate to be indexed before returning, so the next publish can resolve it.
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p mainstage_core --locked
          cargo publish -p mainstage_lsp --locked
          cargo publish -p mainstage --locked
