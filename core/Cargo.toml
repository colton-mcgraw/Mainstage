[package]
name = "mainstage_core"
version = "0.2.0"
edition = "2024"

[dependencies]
chrono = "0.4.42"
lazy_static = "1.5.0"
pest = "2.8.3"
pest_derive = "2.8.3"
uuid = { version = "1.18.1", features = ["v4"] }
glob = "0.3"
async-trait = "0.1.89"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures = "0.3"
libloading = "0.8"
libc = "0.2"
log = "0.4"
 
[dev-dependencies]
assert_cmd = "2"
tempfile = "3"
